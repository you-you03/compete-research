<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>横断比較ビュー — 競合リサーチ</title>
<style>
  :root {
    --bg: #f5f4f0;
    --bg-card: #fbfaf6;
    --ink: #14171c;
    --ink-2: #3d434c;
    --ink-3: #6b6f76;
    --ink-4: #9aa0a8;
    --rule: #e6e2d6;
    --rule-strong: #d6d1c0;

    --c-hero:    #0f172a;
    --c-scale:   #c2410c;
    --c-service: #0369a1;
    --c-biz:     #b91c1c;
    --c-diff:    #047857;
    --c-rep-pos: #047857;
    --c-rep-neg: #b91c1c;
    --c-mkt:     #6d28d9;
    --c-hire:    #4d7c0f;
    --c-news:    #1e293b;
    --c-self:    #b45309;
    --c-ir:      #0c4a6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { display: flex; min-height: 100vh; }

  mark {
    background: rgba(14,165,233,0.13);
    border-radius: 3px;
    padding: 0 3px;
    color: inherit;
  }

  /* ============ Sidebar ============ */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg-card);
    color: var(--ink-2);
    padding: 28px 16px;
    height: 100vh;
    position: sticky;
    top: 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--rule);
  }
  .sb-eyebrow {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.22em;
    color: var(--ink-3);
    margin-bottom: 6px;
    text-transform: uppercase;
    padding: 0 12px;
  }
  .sb-title {
    font-size: 21px;
    font-weight: 800;
    color: var(--ink);
    margin-bottom: 28px;
    line-height: 1.35;
    padding: 0 12px;
    letter-spacing: -0.01em;
  }
  .sb-section {
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 0 12px;
    margin: 8px 0 10px;
  }
  .nav-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--ink-2); text-decoration: none;
    transition: background 0.14s ease, color 0.14s ease;
  }
  .nav-item:hover { background: rgba(0,0,0,0.04); color: var(--ink); }
  .nav-item.active {
    background: var(--bg);
    font-weight: 700;
    color: var(--ink);
  }
  .nav-dot {
    width: 4px; height: 20px; border-radius: 2px;
    background: var(--rule-strong);
    flex-shrink: 0;
    transition: background 0.16s ease;
  }
  .nav-num {
    font-size: 10px;
    font-weight: 800;
    color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.08em;
    min-width: 18px;
  }
  .nav-item.active .nav-num { color: var(--ink-3); }

  .sb-back-link {
    display: flex; align-items: center; gap: 8px;
    margin: 20px 12px 0;
    padding: 10px 14px;
    background: var(--bg);
    border: 1px solid var(--rule);
    border-radius: 10px;
    font-size: 13px; font-weight: 700;
    color: var(--ink-2);
    text-decoration: none;
    transition: background 0.14s, color 0.14s;
  }
  .sb-back-link:hover { background: #ece9e0; color: var(--ink); }
  .sb-back-link .arrow { color: var(--ink-4); font-weight: 600; }

  .sb-footer {
    margin-top: auto;
    padding: 16px 12px 0;
    font-size: 12px;
    color: var(--ink-3);
    border-top: 1px solid var(--rule);
    line-height: 1.6;
  }

  /* ============ Main ============ */
  .main {
    flex: 1;
    padding: 28px 36px 80px;
    overflow-x: hidden;
    max-width: 1280px;
  }
  .topbar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 32px;
    gap: 16px;
    border-bottom: 1px solid var(--rule);
    padding-bottom: 14px;
  }
  .crumb {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .timestamp {
    font-size: 13px;
    color: var(--ink-4);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }
  .timestamp .dot {
    margin: 0 8px;
    color: var(--rule-strong);
  }

  /* ============ Section common ============ */
  .compare-section {
    margin-bottom: 72px;
    scroll-margin-top: 24px;
    animation: fadeUp 0.42s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: none; }
  }
  .cs-header {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
  }
  .cs-eyebrow {
    font-size: 11px; font-weight: 800; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--ink-3);
    display: flex; align-items: center; gap: 10px;
  }
  .cs-eyebrow .num {
    font-variant-numeric: tabular-nums;
    color: var(--ink-4);
  }
  .cs-eyebrow .accent-bar {
    width: 22px; height: 2px;
    background: var(--accent, var(--ink));
    border-radius: 2px;
  }
  .cs-title {
    font-size: 26px; font-weight: 800;
    letter-spacing: -0.01em; color: var(--ink);
  }
  .cs-desc { font-size: 14px; color: var(--ink-3); line-height: 1.6; }

  .empty-cell { color: var(--ink-4); font-style: italic; }

  /* ============ 01. Scores ============ */
  .score-table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 8px;
    overflow: hidden;
  }
  .score-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .score-table th, .score-table td {
    padding: 18px 16px;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
    text-align: center;
  }
  .score-table tr:last-child th, .score-table tr:last-child td { border-bottom: none; }
  .score-table thead th {
    text-align: center;
    font-size: 13px; font-weight: 800;
    color: var(--ink);
    border-bottom: 2px solid var(--rule-strong);
    padding: 14px 16px 12px;
  }
  .score-table thead th .ticker {
    display: block;
    font-size: 10px; font-weight: 700;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    margin-top: 4px;
    text-transform: uppercase;
  }
  .score-table thead th.is-self {
    color: var(--c-scale);
  }
  .score-table thead th.is-self .ticker {
    color: var(--c-scale);
    opacity: 0.7;
  }
  .score-table .row-label {
    text-align: left;
    width: 200px;
    color: var(--ink-2);
    font-weight: 700;
    font-size: 14px;
    position: relative;
  }
  .score-table .row-label .label-dot {
    display: inline-block;
    width: 4px; height: 16px;
    border-radius: 2px;
    background: var(--accent, var(--rule-strong));
    margin-right: 10px;
    vertical-align: -3px;
  }
  .score-table .row-label .row-unit {
    color: var(--ink-4);
    font-size: 11px;
    font-weight: 700;
    margin-left: 6px;
  }
  .score-cell {
    line-height: 1;
  }
  .score-num {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .score-bar {
    height: 4px;
    border-radius: 2px;
    background: var(--rule);
    margin: 10px auto 0;
    width: 60px;
    overflow: hidden;
  }
  .score-bar-fill {
    height: 100%;
    border-radius: 2px;
  }
  .score-empty {
    font-size: 24px;
    color: var(--ink-4);
    font-weight: 600;
  }

  .rationale-list {
    margin-top: 20px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .score-rationale {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 0;
  }
  .score-rationale summary {
    list-style: none;
    cursor: pointer;
    padding: 14px 18px;
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .score-rationale summary::-webkit-details-marker { display: none; }
  .score-rationale summary::before {
    content: '+';
    font-size: 16px;
    color: var(--ink-4);
    font-weight: 700;
    width: 16px;
    text-align: center;
  }
  .score-rationale[open] summary::before { content: '−'; }
  .score-rationale[open] summary { border-bottom: 1px solid var(--rule); }
  .score-rationale .rationale-body {
    padding: 14px 18px 18px 46px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-2);
  }
  .score-rationale .summary-prio {
    margin-left: auto;
    font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid currentColor;
    letter-spacing: 0.06em;
  }
  .summary-prio.self { color: var(--c-scale); }
  .summary-prio.high { color: var(--c-biz); }
  .summary-prio.medium { color: var(--c-service); }
  .summary-prio.low { color: var(--ink-4); }

  /* ============ 02. Service Flow ============ */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .service-card,
  .diff-card,
  .mkt-card {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 22px 24px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .service-card::before {
    content: ''; position: absolute;
    left: 0; top: 22px; bottom: 22px;
    width: 3px; border-radius: 0 3px 3px 0;
    background: var(--c-service);
  }
  .card-head {
    display: flex; align-items: center; gap: 8px;
    flex-wrap: wrap;
  }
  .card-name { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; }
  .card-prio {
    font-size: 10px; font-weight: 800;
    padding: 2px 7px; border-radius: 4px;
    border: 1px solid currentColor;
    letter-spacing: 0.06em;
  }
  .card-prio.self { color: var(--c-scale); }
  .card-prio.high { color: var(--c-biz); }
  .card-prio.medium { color: var(--c-service); }
  .card-prio.low { color: var(--ink-4); }

  .service-meta {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    padding: 12px 0;
  }
  .meta-cell {
    display: flex; flex-direction: column; gap: 3px;
  }
  .meta-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .meta-value {
    font-size: 13px;
    color: var(--ink);
    font-weight: 700;
    line-height: 1.4;
  }
  .meta-value.big {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.01em;
    font-variant-numeric: tabular-nums;
  }
  .meta-value.big .unit { font-size: 12px; color: var(--ink-3); margin-left: 2px; font-weight: 700; }

  .service-overview {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-2);
  }
  .flow-steps {
    list-style: none;
    display: flex; flex-direction: column; gap: 6px;
  }
  .flow-step {
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--ink-2);
    display: flex;
    gap: 8px;
  }
  .flow-num {
    flex-shrink: 0;
    font-weight: 800;
    color: var(--c-service);
    font-variant-numeric: tabular-nums;
    min-width: 18px;
  }
  .flow-more {
    font-size: 11px;
    color: var(--ink-4);
    font-style: italic;
    margin-top: 2px;
  }
  .section-subtitle {
    font-size: 11px; font-weight: 800;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 6px;
  }

  /* ============ 03. Business Model table ============ */
  .biz-table-wrap {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 18px;
    overflow: hidden;
  }
  .biz-table {
    width: 100%;
    border-collapse: collapse;
  }
  .biz-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 14px 18px;
    border-bottom: 2px solid var(--rule-strong);
    background: rgba(0,0,0,0.015);
  }
  .biz-table td {
    font-size: 13px;
    line-height: 1.55;
    vertical-align: top;
    padding: 18px;
    border-bottom: 1px solid var(--rule);
    color: var(--ink-2);
  }
  .biz-table tr:last-child td { border-bottom: none; }
  .biz-table tr:hover td { background: rgba(0,0,0,0.015); }
  .biz-co {
    font-size: 14px;
    font-weight: 800;
    color: var(--ink);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .biz-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 4px;
    border: 1px solid currentColor;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }

  /* ============ 04. Differentiation ============ */
  .diff-card::before {
    content: ''; position: absolute;
    left: 0; top: 22px; bottom: 22px;
    width: 3px; border-radius: 0 3px 3px 0;
    background: var(--c-diff);
  }
  .diff-quote {
    font-size: 14px;
    font-style: italic;
    color: var(--ink-2);
    line-height: 1.6;
    border-left: 2px solid var(--rule-strong);
    padding-left: 12px;
    font-family: 'Georgia', 'Hiragino Mincho ProN', serif;
  }
  .feature-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .feature-chip {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 6px;
    background: rgba(4,120,87,0.08);
    color: var(--c-diff);
    border: 1px solid rgba(4,120,87,0.2);
    font-weight: 600;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .diff-target {
    font-size: 12px;
    color: var(--ink-3);
    line-height: 1.55;
    border-top: 1px dashed var(--rule);
    padding-top: 10px;
  }
  .diff-target .meta-label { margin-bottom: 4px; }

  /* ============ 05. Marketing ============ */
  .mkt-overview-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 0;
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 14px;
    margin-bottom: 20px;
    overflow: hidden;
  }
  .mkt-overview-cell {
    padding: 18px 20px;
    border-right: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .mkt-overview-cell:last-child { border-right: none; }
  .mkt-co-name { font-size: 14px; font-weight: 800; color: var(--ink); }
  .mkt-pills { display: flex; flex-wrap: wrap; gap: 6px; }
  .mkt-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.02em;
  }
  .mkt-pill.on {
    background: rgba(109,40,217,0.1);
    color: var(--c-mkt);
    border: 1px solid rgba(109,40,217,0.25);
  }
  .mkt-pill.off {
    background: var(--bg);
    color: var(--ink-4);
    border: 1px solid var(--rule-strong);
  }

  .mkt-card::before {
    content: ''; position: absolute;
    left: 0; top: 22px; bottom: 22px;
    width: 3px; border-radius: 0 3px 3px 0;
    background: var(--c-mkt);
  }
  .mkt-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .mkt-row-label {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .mkt-row-text {
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-2);
  }

  /* ============ 06. IR ============ */
  .ir-summary-wrap {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 18px;
    overflow: hidden;
    margin-bottom: 24px;
  }
  .ir-summary-table {
    width: 100%;
    border-collapse: collapse;
  }
  .ir-summary-table th {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 14px 18px;
    border-bottom: 2px solid var(--rule-strong);
    text-align: left;
    background: rgba(0,0,0,0.015);
  }
  .ir-summary-table td {
    font-size: 13px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--rule);
    vertical-align: middle;
    color: var(--ink-2);
  }
  .ir-summary-table tr:last-child td { border-bottom: none; }
  .ir-summary-table tr:hover td { background: rgba(0,0,0,0.015); }
  .ir-summary-co {
    font-size: 14px;
    font-weight: 800;
    color: var(--ink);
  }
  .ir-trend-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 800;
    padding: 3px 9px;
    border-radius: 5px;
    letter-spacing: 0.04em;
  }
  .ir-trend-badge.up   { background: rgba(4,120,87,0.1);  color: var(--c-diff); }
  .ir-trend-badge.down { background: rgba(185,28,28,0.1); color: var(--c-biz);  }
  .ir-trend-badge.flat { background: rgba(0,0,0,0.05);    color: var(--ink-3);  }
  .ir-na { color: var(--ink-4); font-style: italic; }

  .ir-detail-grid {
    display: flex;
    flex-direction: column;
    gap: 24px;
    margin-bottom: 24px;
  }
  .ir-detail-card {
    background: var(--bg-card);
    border: 1px solid var(--rule);
    border-radius: 20px;
    padding: 32px 36px;
    position: relative;
  }
  .ir-detail-card::before {
    content: ''; position: absolute;
    left: 0; top: 32px; bottom: 32px;
    width: 4px; border-radius: 0 4px 4px 0;
    background: var(--c-ir);
  }
  .ir-card-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .ir-card-name {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.015em;
  }
  .ir-card-overview {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--ink-2);
    margin-bottom: 28px;
    max-width: 880px;
  }
  /* Full-width body: chart + plan side by side, larger */
  .ir-card-body {
    display: grid;
    grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
    gap: 36px;
    margin-bottom: 28px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--rule);
  }
  .ir-block-title {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .ir-block-title::after {
    content: ''; flex: 1; height: 1px;
    background: var(--rule);
  }
  /* Bigger revenue trend bars */
  .ir-mini-chart { display: flex; flex-direction: column; gap: 10px; }
  .ir-mini-row {
    display: grid;
    grid-template-columns: 90px 1fr 80px;
    gap: 14px;
    align-items: center;
  }
  .ir-mini-period {
    font-size: 12px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .ir-mini-bar-wrap {
    height: 10px;
    background: var(--rule);
    border-radius: 5px;
    overflow: hidden;
  }
  .ir-mini-bar {
    height: 100%;
    border-radius: 5px;
    background: var(--c-ir);
    transition: width 0.6s ease;
  }
  .ir-mini-val {
    font-size: 13px;
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .ir-mini-val .unit { color: var(--ink-4); font-weight: 600; margin-left: 2px; font-size: 11px; }

  /* Plan KV becomes a 2-col stat grid for full-width */

// ===== Utilities =====
const $  = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => Array.from(r.querySelectorAll(s));
const escapeHtml = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isEmpty = v => v == null || v === '' || (Array.isArray(v) && v.length === 0);
const dash = '<span class="empty-cell">—</span>';

const PRIORITY_ORDER = { self: 0, high: 1, medium: 2, low: 3 };
const sortedCompanies = () => COMPANIES_DATA.slice().sort((a, b) =>
  (PRIORITY_ORDER[a.priority] ?? 99) - (PRIORITY_ORDER[b.priority] ?? 99));

const shortName = (c) => c.name.replace(/（.*?）/, '');
const priorityClass = (p) => ({ self:'self', high:'high', medium:'medium', low:'low' })[p] || 'low';
const priorityLabel = (p) => ({ self:'自社', high:'HIGH', medium:'MED', low:'LOW' })[p] || String(p||'').toUpperCase();

function highlightSummary(text) {
  if (isEmpty(text)) return '—';
  let s = escapeHtml(text);
  s = s.replace(/(\d[\d,\.]*\s*(?:人|社|%|％|円|億|万|倍|位|年|月|時間|秒|時|個|件))/g, '<mark>$1</mark>');
  s = s.replace(/(特許第[\d]+号)/g, '<mark>$1</mark>');
  s = s.replace(/「([^」]+)」/g, '<mark>「$1」</mark>');
  return s;
}

function truncate(s, n) {
  if (!s) return '';
  s = String(s);
  return s.length > n ? s.substring(0, n) + '…' : s;
}

// ============ 01. Scores ============
const SCORE_ROWS = [
  { key: 'threat_level',         label: '脅威度',         unit: '/5', accent: 'var(--c-biz)' },
  { key: 'service_completeness', label: 'サービス完成度', unit: '/5', accent: 'var(--c-service)' },
  { key: 'marketing_strength',   label: 'マーケ強度',     unit: '/5', accent: 'var(--c-mkt)' },
];

function scoreColor(n) {
  if (n === 5) return 'var(--c-diff)';
  if (n === 4) return '#16a34a';
  if (n === 3) return '#ca8a04';
  if (n === 2) return 'var(--c-biz)';
  if (n === 1) return '#991b1b';
  return 'var(--ink-4)';
}

function buildScoresSection(companies) {
  const cs = sortedCompanies();
  const headers = cs.map(c => {
    const cls = c.priority === 'self' ? 'is-self' : '';
    return `<th class="${cls}">${escapeHtml(shortName(c))}<span class="ticker">${priorityLabel(c.priority)}</span></th>`;
  }).join('');

  const rows = SCORE_ROWS.map(row => {
    const cells = cs.map(c => {
      const v = c.scores?.[row.key];
      if (v == null || v === 0) {
        return `<td class="score-cell"><span class="score-empty">—</span></td>`;
      }
      const color = scoreColor(v);
      const pct = (v / 5) * 100;
      return `<td class="score-cell">
        <span class="score-num" style="color:${color}">${v}</span>
        <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%; background:${color}"></div></div>
      </td>`;
    }).join('');
    return `<tr>
      <td class="row-label">
        <span class="label-dot" style="--accent:${row.accent}"></span>${row.label}
        <span class="row-unit">${row.unit}</span>
      </td>
      ${cells}
    </tr>`;
  }).join('');

  const rationales = cs.map(c => {
    const r = c.scores?.scoring_rationale;
    if (isEmpty(r)) return '';
    const cls = priorityClass(c.priority);
    return `<details class="score-rationale">
      <summary>
        ${escapeHtml(shortName(c))}
        <span class="summary-prio ${cls}">${priorityLabel(c.priority)}</span>
      </summary>
      <div class="rationale-body">${highlightSummary(r)}</div>
    </details>`;
  }).join('');

  return `
    <div class="cs-header">
      <span class="cs-eyebrow"><span class="accent-bar"></span><span class="num">01</span> SCORES</span>
      <h2 class="cs-title">スコア比較</h2>
      <p class="cs-desc">脅威度・サービス完成度・マーケ強度の3軸で全社を横並び評価。各社の評価コメントは下のアコーディオンから確認できる。</p>
    </div>
    <div class="score-table-wrap">
      <table class="score-table">
        <thead><tr><th></th>${headers}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="rationale-list">${rationales}</div>
  `;
}

// ============ 06. IR / Finance ============
function irTrendBadge(trend) {
  if (!Array.isArray(trend) || trend.length < 2) return '<span class="ir-na">—</span>';
  const last = trend[trend.length - 1]?.op_profit_bn ?? 0;
  const prev = trend[trend.length - 2]?.op_profit_bn ?? 0;
  if (last > prev) return '<span class="ir-trend-badge up">↑ 改善</span>';
  if (last < prev) return '<span class="ir-trend-badge down">↓ 悪化</span>';
  return '<span class="ir-trend-badge flat">→ 横ばい</span>';
}

    return `<div class="ir-detail-card">

          <div class="ir-block-title">中期計画目標</div>
          <div class="ir-plan-kv">${planRows || dash}</div>
        </div>
      </div>
      <div class="ir-assess">
        <div>
          <div class="ir-assess-col-title pos">強み・安定要因</div>
          <div class="ir-chips">${strengths || dash}</div>
        </div>
        <div>
          <div class="ir-assess-col-title neg">リスク要因</div>
          <div class="ir-chips">${risks || dash}</div>
        </div>
      </div>
      ${sa.growth_outlook ? `<div class="ir-outlook"><span class="ir-outlook-label">成長見通し</span>${escapeHtml(sa.growth_outlook)}</div>` : ''}
    </div>`;
  }).join('');

  const placeholders = withoutIR.map(c =>
    `<span class="ir-placeholder-item">${escapeHtml(shortName(c))} — 非上場 / IR データなし</span>`
  ).join('');

  return `
    <div class="cs-header">
      <span class="cs-eyebrow"><span class="accent-bar"></span><span class="num">06</span> IR &amp; FINANCE</span>
      <h2 class="cs-title">IR・財務分析比較</h2>
      <p class="cs-desc">上場企業・IR開示データを持つ会社の財務安定性・成長性を横断比較。データのない会社は下段にプレースホルダーで示す。</p>
    </div>
    <div class="ir-summary-wrap">
      <table class="ir-summary-table">
        <thead>
          <tr>
            <th>企業</th>
            <th>上場区分</th>
            <th>親会社</th>
            <th>直近売上</th>
            <th>営業利益トレンド</th>
            <th>FY28 売上目標</th>
          </tr>
        </thead>
        <tbody>${summaryRows}</tbody>
      </table>
    </div>
    ${detailCards ? `<div class="ir-detail-grid">${detailCards}</div>` : ''}
    ${placeholders ? `<div class="ir-placeholder-wrap">
      <div class="ir-placeholder-title">IR データなしの会社</div>
      <div class="ir-placeholder-list">${placeholders}</div>
    </div>` : ''}
  `;
}

// ============ 07. News timeline ============
// Stable per-company palette. Cycles if more companies than colors.
const NEWS_PALETTE = [
  { color: '#c2410c', soft: 'rgba(194,65,12,0.08)',  border: 'rgba(194,65,12,0.25)'  }, // burnt orange
  { color: '#0369a1', soft: 'rgba(3,105,161,0.08)',  border: 'rgba(3,105,161,0.25)'  }, // deep sky
  { color: '#047857', soft: 'rgba(4,120,87,0.08)',   border: 'rgba(4,120,87,0.25)'   }, // emerald
  { color: '#6d28d9', soft: 'rgba(109,40,217,0.08)', border: 'rgba(109,40,217,0.25)' }, // violet
  { color: '#b91c1c', soft: 'rgba(185,28,28,0.08)',  border: 'rgba(185,28,28,0.25)'  }, // coral red
  { color: '#4d7c0f', soft: 'rgba(77,124,15,0.08)',  border: 'rgba(77,124,15,0.25)'  }, // lime
  { color: '#b45309', soft: 'rgba(180,83,9,0.08)',   border: 'rgba(180,83,9,0.25)'   }, // amber
  { color: '#0c4a6e', soft: 'rgba(12,74,110,0.08)',  border: 'rgba(12,74,110,0.25)'  }, // navy
];

function buildCompanyColorMap() {
  // Self always gets the brand orange. Others cycle through the palette in priority order.
  const map = {};
  const cs = sortedCompanies();
  let idx = 0;
  cs.forEach(c => {
    if (c.priority === 'self') {
      map[c.id] = NEWS_PALETTE[0];
    } else {
      idx += 1;
      map[c.id] = NEWS_PALETTE[idx % NEWS_PALETTE.length];
    }
  });
  return map;
}

function formatNewsDate(d) {
  const m = String(d || '').match(/^(\d{4})-(\d{2})/);
  if (!m) return escapeHtml(d || '');
  return `${m[1]}年${parseInt(m[2],10)}月`;
}

function buildNewsSection(companies) {
  const colorMap = buildCompanyColorMap();
  const items = [];
  const counts = {};
  COMPANIES_DATA.forEach(c => {
    const news = c.details?.news || [];
    counts[c.id] = news.length;
    news.forEach(n => items.push({
      date: n.date || '',
      title: n.title || '',
      summary: n.summary || '',
      co: c
    }));
  });
  items.sort((a, b) => (a.date < b.date ? 1 : a.date > b.date ? -1 : 0));

  const legend = sortedCompanies().map(c => {
    const p = colorMap[c.id];
    return `<span class="news-legend-item" style="--co:${p.color}">
      <span class="news-legend-swatch"></span>${escapeHtml(shortName(c))}
      <span class="news-legend-count">${counts[c.id] || 0}件</span>
    </span>`;
  }).join('');

  const rows = items.map(it => {
    const c = it.co;
    const p = colorMap[c.id];
    const styleVars = `--co:${p.color}; --co-soft:${p.soft}; --co-border:${p.border};`;
    return `<div class="news-item" style="${styleVars}">
      <div class="news-date">${formatNewsDate(it.date)}</div>
      <div class="news-rail"><span class="news-dot"></span></div>
      <div class="news-content">
        <span class="news-co-badge">${escapeHtml(shortName(c))}</span>
        <div class="news-title">${escapeHtml(it.title)}</div>
        <div class="news-summary">${highlightSummary(truncate(it.summary, 180))}</div>
      </div>
    </div>`;
  }).join('');

  return `
    <div class="cs-header">
      <span class="cs-eyebrow"><span class="accent-bar"></span><span class="num">07</span> NEWS</span>
      <h2 class="cs-title">ニュース横断タイムライン</h2>
      <p class="cs-desc">全社の最新ニュースを時系列で並べて、業界全体のトレンドを把握する。${items.length}件を新しい順に表示。</p>
    </div>
    <div class="news-legend">
      <span class="news-legend-label">凡例</span>
      ${legend}
    </div>
    <div class="news-timeline">${rows || dash}</div>
  `;
}

// ============ Init ============
function render() {
  $('#topCount').textContent = `${COMPANIES_DATA.length}社のデータ`;
  $('#topDate').textContent = TODAY;
  $('#footerDate').textContent = TODAY;

  $('#s-scores').innerHTML    = buildScoresSection(COMPANIES_DATA);
  $('#s-service').innerHTML   = buildServiceSection(COMPANIES_DATA);
  $('#s-biz').innerHTML       = buildBizSection(COMPANIES_DATA);
  $('#s-diff').innerHTML      = buildDiffSection(COMPANIES_DATA);
  $('#s-marketing').innerHTML = buildMarketingSection(COMPANIES_DATA);
  $('#s-ir').innerHTML        = buildIrSection(COMPANIES_DATA);
  $('#s-news').innerHTML      = buildNewsSection(COMPANIES_DATA);

  // Sidebar nav active-state observer
  const SECTION_ACCENTS = {
    's-scores':    'var(--c-scale)',
    's-service':   'var(--c-service)',
    's-biz':       'var(--c-biz)',
    's-diff':      'var(--c-diff)',
    's-marketing': 'var(--c-mkt)',
    's-ir':        'var(--c-ir)',
    's-news':      'var(--c-news)',
  };
  const navItems = $$('.nav-item');
  const sections = $$('.compare-section');

  function setActive(id) {
    navItems.forEach(n => {
      const isActive = n.dataset.target === id;
      n.classList.toggle('active', isActive);
      const dot = n.querySelector('.nav-dot');
      if (dot) dot.style.background = isActive ? SECTION_ACCENTS[id] : '';
    });
  }

  const observer = new IntersectionObserver((entries) => {
    // Pick the most-visible section
    const visible = entries
      .filter(e => e.isIntersecting)
      .sort((a, b) => b.intersectionRatio - a.intersectionRatio);
    if (visible.length) setActive(visible[0].target.id);
  }, { rootMargin: '-15% 0px -55% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] });

  sections.forEach(s => observer.observe(s));

  // Smooth scroll for nav anchors
  navItems.forEach(n => {
    n.addEventListener('click', (e) => {
      const target = document.getElementById(n.dataset.target);
      if (target) {
        e.preventDefault();
        const top = target.getBoundingClientRect().top + window.pageYOffset - 16;
        window.scrollTo({ top, behavior: 'smooth' });
        setActive(n.dataset.target);
      }
    });
  });

  setActive('s-scores');
}

render();
</script>
